<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { max-width: 1100px; margin: 40px auto; font-family: sans-serif; }
        .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 6px; white-space: nowrap; }
        .actions { display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; min-width: 220px; }
        input { max-width: 150px; }
        #foutmelding { color: red; }
        #ingelogdeNaam { font-weight: 600; }
    </style>
</head>
<body>
    <h1>Drivers API</h1>

    <div class="row">
        <span id="loginVelden">
            <label for="crudEmail">E-mail</label>
            <input id="crudEmail" type="email" placeholder="jij@mail.com">
            <label for="crudWachtwoord">Wachtwoord</label>
            <input id="crudWachtwoord" type="password" placeholder="wachtwoord">
            <button onclick="loginUser()">Inloggen</button>
        </span>
        <span id="ingelogdeNaam" style="display:none"></span>
        <button id="logoutKnop" onclick="logoutUser()" style="display:none">Uitloggen</button>
        <button onclick="startNieuw()">Nieuwe driver</button>
    </div>

    <p id="loginStatus"></p>
    <div style="overflow-x:auto">
        <table>
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Number</th>
                    <th>Nationality</th>
                    <th>Date of Birth</th>
                    <th>Team</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabelInhoud"></tbody>
        </table>
    </div>
    <p id="foutmelding"></p>

    <script>
        "use strict";

        const api = "http://localhost:8000/api";
        const endpoints = {
            drivers: `${api}/drivers`,
            login: `${api}/login`,
            guest: `${api}/tokens/guest`,
        };

        const keys = {
            token: "f1_token",
            abilities: "f1_abilities",
            userName: "f1_user_name",
        };

        let drivers = [];
        let editId = null;
        let nieuwModus = false;

        const $ = (id) => document.getElementById(id);
        const msg = (text = "") => { $("foutmelding").textContent = text; };
        const abilities = () => JSON.parse(localStorage.getItem(keys.abilities) || "[]");
        const hasCrud = () => abilities().includes("crud");
        const token = () => localStorage.getItem(keys.token);

        //slaat locaal de token op
        const saveAuth = (tokenValue, tokenAbilities, name = "") => {
            localStorage.setItem(keys.token, tokenValue);
            localStorage.setItem(keys.abilities, JSON.stringify(tokenAbilities || []));
            if (name) localStorage.setItem(keys.userName, name);
            else localStorage.removeItem(keys.userName);
        };
        //verwijdert token uit local storage
        const clearAuth = () => {
            Object.values(keys).forEach((k) => localStorage.removeItem(k));
        };
        //genereert de headers voor een request, inclusief de token
        const headers = () => ({
            headers: {
                Authorization: `Bearer ${token()}`,
                Accept: "application/json",
            },
        });
        //past de ui aan op basis van je token
        const updateLoginUi = () => {
            const logged = hasCrud();
            $("loginVelden").style.display = logged ? "none" : "inline";
            $("ingelogdeNaam").style.display = logged ? "inline" : "none";
            $("logoutKnop").style.display = logged ? "inline-block" : "none";
            $("ingelogdeNaam").textContent = logged
                ? `Ingelogd als: ${localStorage.getItem(keys.userName) || "User"}`
                : "";

            $("loginStatus").style.color = logged ? "green" : "#333";
            $("loginStatus").textContent = !token()
                ? "inloggen mislukt, probeer opnieuw."
                : logged
                    ? "User token met CRUD actief."
                    : "Gast token actief (alleen lezen).";
        };
        //zorgt dat je een token hebt om te lezen, maakt een gast token aan als je die nog niet hebt
        const ensureReadToken = async () => {
            if (token()) return;
            const res = await axios.post(endpoints.guest, {}, { headers: { Accept: "application/json" } });
            saveAuth(res.data.token, res.data.abilities || ["read"]);
        };
        //controle of je een crud token hebt
        const requireCrud = () => {
            if (!hasCrud()) throw new Error("Log eerst in met een user token met CRUD-rechten.");
        };
        //het bijwerken
        const rowEdit = (d) => `
            <tr>
                <td><input id="edit-first-${d.id}" value="${d.first_name ?? ""}"></td>
                <td><input id="edit-last-${d.id}" value="${d.last_name ?? ""}"></td>
                <td><input id="edit-number-${d.id}" type="number" min="1" max="99" value="${d.number ?? ""}"></td>
                <td><input id="edit-nationality-${d.id}" value="${d.nationality ?? ""}"></td>
                <td><input id="edit-dob-${d.id}" type="date" value="${String(d.date_of_birth || "").slice(0, 10)}"></td>
                <td><input id="edit-team-${d.id}" type="number" min="1" value="${d.team_id ?? ""}"></td>
                <td class="actions">
                    <button onclick="saveDriver(${d.id})">Opslaan</button>
                    <button onclick="deleteDriver(${d.id})">Verwijder</button>
                    <button onclick="cancelEdit()">Annuleer</button>
                </td>
            </tr>`;
            //het aanmaken
        const rowNew = () => `
            <tr>
                <td><input id="new-first"></td>
                <td><input id="new-last"></td>
                <td><input id="new-number" type="number" min="1" max="99"></td>
                <td><input id="new-nationality"></td>
                <td><input id="new-dob" type="date"></td>
                <td><input id="new-team" type="number" min="1"></td>
                <td class="actions">
                    <button onclick="createDriver()">Aanmaken</button>
                    <button onclick="cancelNew()">Annuleer</button>
                </td>
            </tr>`;
            //de normale weergave van een rij
        const rowView = (d) => `
            <tr>
                <td>${d.first_name ?? ""}</td>
                <td>${d.last_name ?? ""}</td>
                <td>${d.number ?? ""}</td>
                <td>${d.nationality ?? ""}</td>
                <td>${String(d.date_of_birth || "").slice(0, 10)}</td>
                <td>${d.team?.name ?? (d.team_id ?? "")}</td>
                <td class="actions">${hasCrud() ? `<button onclick="startEdit(${d.id})">Wijzig</button>` : ""}</td>
            </tr>`;
            //
        const render = () => {
            const rows = [];
            if (hasCrud() && nieuwModus) rows.push(rowNew());
            drivers.forEach((d) => rows.push(hasCrud() && d.id === editId ? rowEdit(d) : rowView(d)));
            $("tabelInhoud").innerHTML = rows.join("");
            updateLoginUi();
        };
        //de functie die de drivers ophaalt en in de tabel zet
        const loadDrivers = async () => {
            try {
                await ensureReadToken();
                const res = await axios.get(endpoints.drivers, headers());
                drivers = res.data;
                editId = null;
                msg();
                render();
            } catch (e) {
                if (e.response?.status === 401) clearAuth();
                msg("Kon drivers niet laden. Controleer of de API draait op http://localhost:8000.");
                updateLoginUi();
            }
        };
        //een wrapper om een actie uit te voeren die een crud token vereist, met foutafhandeling
        const withCrud = async (fn) => {
            try {
                requireCrud();
                await fn();
            } catch (e) {
                if (e.response?.status === 401) {
                    clearAuth();
                    editId = null;
                    nieuwModus = false;
                    render();
                    msg("Inloggen verlopen. Log opnieuw in.");
                    return;
                }
                if (e.response?.status === 422) {
                    msg("Validatie mislukt. Controleer je invoer.");
                    return;
                }
                msg(e.message || "Actie mislukt.");
            }
        };
        //het inloggen van een gebruiker om een user token te krijgen
        async function loginUser() {
            const email = $("crudEmail").value.trim();
            const password = $("crudWachtwoord").value;
            if (!email || !password) return msg("Vul e-mail en wachtwoord in.");
            try {
                const res = await axios.post(endpoints.login, { email, password }, { headers: { Accept: "application/json" } });
                saveAuth(res.data.token, res.data.abilities || [], res.data.user?.name || "");
                msg();
                render();
            } catch {
                clearAuth();
                render();
            }
        }
        //het uitloggen van een gebruiker
        function logoutUser() {
            clearAuth();
            editId = null;
            nieuwModus = false;
            loadDrivers();
        }
        //starten van het aanmaken van een nieuwe driver
        function startNieuw() {
            if (!hasCrud()) return msg("Log eerst in met user token.");
            editId = null;
            nieuwModus = true;
            msg();
            render();
        }

        function cancelNew() { nieuwModus = false; msg(); render(); }
        function startEdit(id) { if (!hasCrud()) return msg("Log eerst in met user token."); nieuwModus = false; editId = id; msg(); render(); }
        function cancelEdit() { editId = null; msg(); render(); }
        //de functies voor het aanmaken van ee nieuwe driver
        async function createDriver() {
            await withCrud(async () => {
                const numberValue = $("new-number").value.trim();
                const payload = {
                    first_name: $("new-first").value.trim(),
                    last_name: $("new-last").value.trim(),
                    number: Number(numberValue),
                    nationality: $("new-nationality").value.trim() || null,
                    date_of_birth: $("new-dob").value || null,
                    team_id: $("new-team").value.trim() ? Number($("new-team").value.trim()) : null,
                };
                if (!payload.first_name || !payload.last_name || !numberValue) throw new Error("Voornaam, achternaam en nummer zijn verplicht.");
                const res = await axios.post(endpoints.drivers, payload, headers());
                drivers.unshift(res.data);
                nieuwModus = false;
                msg();
                render();
            });
        }
        // het oplaan van een aangepaste driver
        async function saveDriver(id) {
            await withCrud(async () => {
                const numberValue = $(`edit-number-${id}`).value.trim();
                const payload = {
                    first_name: $(`edit-first-${id}`).value.trim(),
                    last_name: $(`edit-last-${id}`).value.trim(),
                    number: Number(numberValue),
                    nationality: $(`edit-nationality-${id}`).value.trim() || null,
                    date_of_birth: $(`edit-dob-${id}`).value || null,
                    team_id: $(`edit-team-${id}`).value.trim() ? Number($(`edit-team-${id}`).value.trim()) : null,
                };
                if (!payload.first_name || !payload.last_name || !numberValue) throw new Error("Voornaam, achternaam en nummer zijn verplicht.");
                const res = await axios.put(`${endpoints.drivers}/${id}`, payload, headers());
                const i = drivers.findIndex((d) => d.id === id);
                if (i >= 0) drivers[i] = res.data;
                editId = null;
                msg();
                render();
            });
        }
        //de functie voor het verwijderen van een driver
        async function deleteDriver(id) {
            if (!confirm("Weet je zeker dat je deze driver wilt verwijderen?")) return;
            await withCrud(async () => {
                await axios.delete(`${endpoints.drivers}/${id}`, headers());
                drivers = drivers.filter((d) => d.id !== id);
                editId = null;
                msg();
                render();
            });
        }
        loadDrivers();
    </script>
</body>
</html>
