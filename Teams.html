<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula 1 API Frontend</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        div,
        footer {
            margin-top: 20px;
        }

        body {
            width: min(95vw, 1200px);
            margin: auto;
            margin-top: 50px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding-right: 10px;
            white-space: nowrap;
        }

        th:last-child,
        td:last-child {
            text-align: right;
            padding-right: 0;
        }

        .actions-cell {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            flex-wrap: wrap;
            min-width: 210px;
        }

        button {
            margin-left: 0;
        }

        input {
            width: 100%;
            max-width: 150px;
        }

        @media (max-width: 900px) {
            body {
                width: 98vw;
            }

            .actions-cell {
                min-width: 170px;
            }
        }
    </style>
</head>

<body onload="laadTeams()">
    <h1>Teams api</h1>
    <div>
        <span id="loginVelden">
            <label for="crudEmail">E-mail</label>
            <input id="crudEmail" type="email" placeholder="jij@mail.com">
            <label for="crudWachtwoord">Wachtwoord</label>
            <input id="crudWachtwoord" type="password" placeholder="wachtwoord">
            <button type="button" onclick="loginMetUserToken()">Inloggen user token</button>
            <button type="button" onclick="loginMetGuestToken()">Gast token</button>
        </span>
        <span id="ingelogdeNaam" style="display: none; font-weight: 600;"></span>
        <button type="button" onclick="uitloggenUserToken()">Uitloggen</button>
        <button type="button" onclick="startNieuwTeam()">Nieuw team</button>
    </div>
    <p id="loginStatus" style="color: #333;"></p>
    <div style="overflow-x: auto;">
        <table>
            <tr>
                <th>Name</th>
                <th>Base Country</th>
                <th>Team Principal</th>
                <th></th>
            </tr>
            <tbody id="tabelInhoud"></tbody>
        </table>
    </div>
    <p id="foutmelding" style="color: red;"></p>
</body>
<script>
    "use strict";
    const apibasis = "http://localhost:8000/api";
    const apiTeams = apibasis + "/teams";
    const apiGuestToken = apibasis + "/tokens/guest";
    const apiLogin = apibasis + "/login";
    const tokenKey = "f1_token";
    const abilitiesKey = "f1_abilities";
    const userNameKey = "f1_user_name";

    let teams = [];
    let editTeamId = null;
    let nieuwTeamModus = false;

    const getToken = () => localStorage.getItem(tokenKey);

    const getAbilities = () => {
        try {
            return JSON.parse(localStorage.getItem(abilitiesKey) || "[]");
        } catch {
            return [];
        }
    }

    const getUserName = () => localStorage.getItem(userNameKey) || "";

    const heeftUserCrudToken = () => getAbilities().includes("crud");

    const saveAuth = (token, abilities, userName = "") => {
        localStorage.setItem(tokenKey, token);
        localStorage.setItem(abilitiesKey, JSON.stringify(abilities || []));
        if (userName) {
            localStorage.setItem(userNameKey, userName);
        } else {
            localStorage.removeItem(userNameKey);
        }
    }

    const clearAuth = () => {
        localStorage.removeItem(tokenKey);
        localStorage.removeItem(abilitiesKey);
        localStorage.removeItem(userNameKey);
    }

    const syncLoginUi = () => {
        const loginVelden = document.getElementById("loginVelden");
        const ingelogdeNaam = document.getElementById("ingelogdeNaam");

        if (heeftUserCrudToken()) {
            loginVelden.style.display = "none";
            ingelogdeNaam.style.display = "inline";
            ingelogdeNaam.textContent = `Ingelogd als: ${getUserName() || "User"}`;
            return;
        }

        loginVelden.style.display = "inline";
        ingelogdeNaam.style.display = "none";
        ingelogdeNaam.textContent = "";
    }

    const getAuthHeaders = () => {
        const token = getToken();
        if (!token) {
            throw new Error("Geen token gevonden. Log in of vraag een gast token aan.");
        }

        return {
            headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/json",
            },
        };
    }

    const ensureLeesToken = async () => {
        if (getToken()) {
            return;
        }

        const response = await axios.post(apiGuestToken, {}, { headers: { Accept: "application/json" } });
        saveAuth(response.data.token, response.data.abilities || ["read"]);
    }

    const getCrudHeaders = () => {
        if (!heeftUserCrudToken()) {
            throw new Error("Log eerst in met een user token met CRUD-rechten.");
        }

        return getAuthHeaders();
    }

    const updateLoginStatus = (tekst, kleur = "#333") => {
        const status = document.getElementById("loginStatus");
        status.style.color = kleur;
        status.textContent = tekst;
    }

    const syncLoginStatus = () => {
        if (!getToken()) {
            updateLoginStatus("Niet ingelogd. Alleen lezen met gast token.");
            syncLoginUi();
            return;
        }

        if (heeftUserCrudToken()) {
            updateLoginStatus("Ingelogd met user token. Bewerken en verwijderen is beschikbaar.", "green");
            syncLoginUi();
            return;
        }

        updateLoginStatus("Ingelogd met gast/read token. Alleen lezen is beschikbaar.");
        syncLoginUi();
    }

    const loginMetUserToken = async () => {
        const email = document.getElementById("crudEmail").value.trim();
        const password = document.getElementById("crudWachtwoord").value;
        const foutmelding = document.getElementById("foutmelding");

        if (!email || !password) {
            updateLoginStatus("Vul e-mail en wachtwoord in.", "red");
            return;
        }

        try {
            const loginResponse = await axios.post(apiLogin, { email, password }, {
                headers: { Accept: "application/json" },
            });

            saveAuth(
                loginResponse.data.token,
                loginResponse.data.abilities || [],
                loginResponse.data.user?.name || ""
            );
            foutmelding.textContent = "";
            syncLoginStatus();
            renderTeams();
        } catch (error) {
            console.error(error);
            clearAuth();
            editTeamId = null;
            nieuwTeamModus = false;
            renderTeams();
            updateLoginStatus("Inloggen mislukt. Controleer je gegevens.", "red");
        }
    }

    const loginMetGuestToken = async () => {
        const foutmelding = document.getElementById("foutmelding");

        try {
            const response = await axios.post(apiGuestToken, {}, { headers: { Accept: "application/json" } });
            saveAuth(response.data.token, response.data.abilities || ["read"]);
            editTeamId = null;
            nieuwTeamModus = false;
            foutmelding.textContent = "";
            syncLoginStatus();
            renderTeams();
        } catch (error) {
            console.error(error);
            updateLoginStatus("Gast token ophalen mislukt.", "red");
        }
    }

    const uitloggenUserToken = () => {
        clearAuth();
        editTeamId = null;
        nieuwTeamModus = false;
        renderTeams();
        syncLoginStatus();
    }

    const maakTeamRij = (team) => {
        if (heeftUserCrudToken() && team.id === editTeamId) {
            return `
                <tr>
                    <td><input id="edit-name-${team.id}" value="${team.name ?? ""}"></td>
                    <td><input id="edit-base-${team.id}" value="${team.base_country ?? ""}"></td>
                    <td><input id="edit-principal-${team.id}" value="${team.team_principal ?? ""}"></td>
                    <td class="actions-cell">
                        <button onclick="slaTeamOp(${team.id})">Opslaan</button>
                        <button onclick="verwijderTeam(${team.id})">Verwijder</button>
                        <button onclick="annuleerBewerken()">Annuleer</button>
                    </td>
                </tr>`;
        }

        return `
            <tr>
                <td>${team.name ?? ""}</td>
                <td>${team.base_country ?? ""}</td>
                <td>${team.team_principal ?? ""}</td>
                <td class="actions-cell">${heeftUserCrudToken() ? `<button onclick="startBewerken(${team.id})">Wijzig</button>` : ""}</td>
            </tr>`;
    }

    const maakNieuwTeamRij = () => {
        if (!heeftUserCrudToken() || !nieuwTeamModus) {
            return "";
        }

        return `
            <tr>
                <td><input id="nieuw-name" placeholder="Name"></td>
                <td><input id="nieuw-base" placeholder="Base country"></td>
                <td><input id="nieuw-principal" placeholder="Team principal"></td>
                <td class="actions-cell">
                    <button onclick="maakTeamAan()">Aanmaken</button>
                    <button onclick="annuleerNieuwTeam()">Annuleer</button>
                </td>
            </tr>`;
    }

    const renderTeams = () => {
        const tabelInhoud = document.getElementById("tabelInhoud");
        tabelInhoud.innerHTML = `${maakNieuwTeamRij()}${teams.map(maakTeamRij).join("")}`;
    }

    const laadTeams = async () => {
        const tabelInhoud = document.getElementById("tabelInhoud");
        const foutmelding = document.getElementById("foutmelding");

        try {
            await ensureLeesToken();
            const authConfig = await getAuthHeaders();
            const response = await axios.get(apiTeams, authConfig);
            const json = response.data;

            teams = json;
            editTeamId = null;
            tabelInhoud.innerHTML = "";
            foutmelding.textContent = "";

            renderTeams();
            syncLoginStatus();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 401) {
                clearAuth();
            }
            foutmelding.textContent = "Kon teams niet laden. Controleer of de API draait op http://localhost:8000.";
        }
    }

    const startBewerken = (id) => {
        if (!heeftUserCrudToken()) {
            document.getElementById("foutmelding").textContent = "Log eerst in met een user token met CRUD-rechten.";
            return;
        }

        nieuwTeamModus = false;
        editTeamId = id;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const annuleerBewerken = () => {
        editTeamId = null;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const startNieuwTeam = () => {
        if (!heeftUserCrudToken()) {
            document.getElementById("foutmelding").textContent = "Log eerst in met een user token met CRUD-rechten.";
            return;
        }

        editTeamId = null;
        nieuwTeamModus = true;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const annuleerNieuwTeam = () => {
        nieuwTeamModus = false;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const maakTeamAan = async () => {
        const foutmelding = document.getElementById("foutmelding");

        try {
            const payload = {
                name: document.getElementById("nieuw-name").value.trim(),
                base_country: document.getElementById("nieuw-base").value.trim() || null,
                team_principal: document.getElementById("nieuw-principal").value.trim() || null,
            };

            if (!payload.name) {
                throw new Error("Naam is verplicht.");
            }

            const crudConfig = await getCrudHeaders();
            const response = await axios.post(apiTeams, payload, crudConfig);
            teams.unshift(response.data);
            nieuwTeamModus = false;
            foutmelding.textContent = "";
            renderTeams();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 422) {
                foutmelding.textContent = "Validatie mislukt. Controleer de invoer.";
                return;
            }
            if (error.response?.status === 401) {
                clearAuth();
                editTeamId = null;
                nieuwTeamModus = false;
                renderTeams();
                syncLoginStatus();
                foutmelding.textContent = "Inloggen mislukt of verlopen. Vul opnieuw e-mail en wachtwoord in.";
                return;
            }
            foutmelding.textContent = error.message || "Team aanmaken is mislukt.";
        }
    }

    const slaTeamOp = async (id) => {
        const foutmelding = document.getElementById("foutmelding");

        try {
            const payload = {
                name: document.getElementById(`edit-name-${id}`).value.trim(),
                base_country: document.getElementById(`edit-base-${id}`).value.trim() || null,
                team_principal: document.getElementById(`edit-principal-${id}`).value.trim() || null,
            };

            if (!payload.name) {
                throw new Error("Naam is verplicht.");
            }

            const crudConfig = await getCrudHeaders();
            const response = await axios.put(`${apiTeams}/${id}`, payload, crudConfig);
            const index = teams.findIndex(team => team.id === id);

            if (index >= 0) {
                teams[index] = response.data;
            }

            editTeamId = null;
            foutmelding.textContent = "";
            renderTeams();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 422) {
                foutmelding.textContent = "Validatie mislukt. Controleer de invoer.";
                return;
            }
            if (error.response?.status === 401) {
                clearAuth();
                editTeamId = null;
                renderTeams();
                syncLoginStatus();
                foutmelding.textContent = "Inloggen mislukt of verlopen. Vul opnieuw e-mail en wachtwoord in.";
                return;
            }
            foutmelding.textContent = error.message || "Team opslaan is mislukt.";
        }
    }

    const verwijderTeam = async (id) => {
        const foutmelding = document.getElementById("foutmelding");

        if (!confirm("Weet je zeker dat je dit team wilt verwijderen?")) {
            return;
        }

        try {
            const crudConfig = await getCrudHeaders();
            await axios.delete(`${apiTeams}/${id}`, crudConfig);

            teams = teams.filter(team => team.id !== id);
            editTeamId = null;
            foutmelding.textContent = "";
            renderTeams();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 401) {
                clearAuth();
                editTeamId = null;
                renderTeams();
                syncLoginStatus();
                foutmelding.textContent = "Inloggen mislukt of verlopen. Vul opnieuw e-mail en wachtwoord in.";
                return;
            }
            foutmelding.textContent = "Team verwijderen is mislukt.";
        }
    }

    window.loginMetUserToken = loginMetUserToken;
    window.loginMetGuestToken = loginMetGuestToken;
    window.uitloggenUserToken = uitloggenUserToken;
    window.startNieuwTeam = startNieuwTeam;
    window.annuleerNieuwTeam = annuleerNieuwTeam;
    window.maakTeamAan = maakTeamAan;
    window.startBewerken = startBewerken;
    window.annuleerBewerken = annuleerBewerken;
    window.slaTeamOp = slaTeamOp;
    window.verwijderTeam = verwijderTeam;
</script>

</html>
