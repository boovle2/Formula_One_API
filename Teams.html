<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula 1 API Frontend</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        div,
        footer {
            margin-top: 20px;
        }

        body {
            width: min(95vw, 1200px);
            margin: auto;
            margin-top: 50px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding-right: 10px;
            white-space: nowrap;
        }

        th:last-child,
        td:last-child {
            text-align: right;
            padding-right: 0;
        }

        .actions-cell {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            flex-wrap: wrap;
            min-width: 210px;
        }

        button {
            margin-left: 0;
        }

        input {
            width: 100%;
            max-width: 150px;
        }

        @media (max-width: 900px) {
            body {
                width: 98vw;
            }

            .actions-cell {
                min-width: 170px;
            }
        }
    </style>
</head>

<body onload="laadTeams()">
    <h1>Teams api</h1>
    <div>
        <label for="crudEmail">E-mail</label>
        <input id="crudEmail" type="email" placeholder="jij@mail.com">
        <label for="crudWachtwoord">Wachtwoord</label>
        <input id="crudWachtwoord" type="password" placeholder="wachtwoord">
        <button type="button" onclick="loginMetUserToken()">Inloggen</button>
        <button type="button" onclick="uitloggenUserToken()">Uitloggen</button>
    </div>
    <p id="loginStatus" style="color: #333;"></p>
    <div style="overflow-x: auto;">
        <table>
            <tr>
                <th>Name</th>
                <th>Base Country</th>
                <th>Team Principal</th>
                <th></th>
            </tr>
            <tbody id="tabelInhoud"></tbody>
        </table>
    </div>
    <p id="foutmelding" style="color: red;"></p>
</body>
<script>
    "use strict";
    const apibasis = "http://localhost:8000/api";
    const apiTeams = apibasis + "/teams";
    const apiGuestToken = apibasis + "/tokens/guest";
    const apiLogin = apibasis + "/login";

    let teams = [];
    let editTeamId = null;
    let crudToken = null;
    let heeftUserCrudToken = false;

    const getAuthHeaders = async () => {
        const tokenResponse = await axios.post(apiGuestToken);
        const token = tokenResponse.data.token;

        return {
            headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/json",
            },
        };
    }

    const getCrudHeaders = async () => {
        if (crudToken && heeftUserCrudToken) {
            return {
                headers: {
                    Authorization: `Bearer ${crudToken}`,
                    Accept: "application/json",
                },
            };
        }

        throw new Error("Log eerst in met een user token met CRUD-rechten.");
    }

    const updateLoginStatus = (tekst, kleur = "#333") => {
        const status = document.getElementById("loginStatus");
        status.style.color = kleur;
        status.textContent = tekst;
    }

    const loginMetUserToken = async () => {
        const email = document.getElementById("crudEmail").value.trim();
        const password = document.getElementById("crudWachtwoord").value;
        const foutmelding = document.getElementById("foutmelding");

        if (!email || !password) {
            updateLoginStatus("Vul e-mail en wachtwoord in.", "red");
            return;
        }

        try {
            const loginResponse = await axios.post(apiLogin, { email, password }, {
                headers: { Accept: "application/json" },
            });

            const abilities = loginResponse.data.abilities || [];
            const heeftCrud = abilities.includes("crud");

            if (!heeftCrud) {
                crudToken = null;
                heeftUserCrudToken = false;
                editTeamId = null;
                renderTeams();
                updateLoginStatus("Ingelogd zonder CRUD-rechten. Je kunt alleen lezen.", "red");
                return;
            }

            crudToken = loginResponse.data.token;
            heeftUserCrudToken = true;
            foutmelding.textContent = "";
            updateLoginStatus("Ingelogd met user token. Bewerken en verwijderen is beschikbaar.", "green");
            renderTeams();
        } catch (error) {
            console.error(error);
            crudToken = null;
            heeftUserCrudToken = false;
            editTeamId = null;
            renderTeams();
            updateLoginStatus("Inloggen mislukt. Controleer je gegevens.", "red");
        }
    }

    const uitloggenUserToken = () => {
        crudToken = null;
        heeftUserCrudToken = false;
        editTeamId = null;
        renderTeams();
        updateLoginStatus("Uitgelogd. Alleen lezen is beschikbaar.");
    }

    const maakTeamRij = (team) => {
        if (heeftUserCrudToken && team.id === editTeamId) {
            return `
                <tr>
                    <td><input id="edit-name-${team.id}" value="${team.name ?? ""}"></td>
                    <td><input id="edit-base-${team.id}" value="${team.base_country ?? ""}"></td>
                    <td><input id="edit-principal-${team.id}" value="${team.team_principal ?? ""}"></td>
                    <td class="actions-cell">
                        <button onclick="slaTeamOp(${team.id})">Opslaan</button>
                        <button onclick="verwijderTeam(${team.id})">Verwijder</button>
                        <button onclick="annuleerBewerken()">Annuleer</button>
                    </td>
                </tr>`;
        }

        return `
            <tr>
                <td>${team.name ?? ""}</td>
                <td>${team.base_country ?? ""}</td>
                <td>${team.team_principal ?? ""}</td>
                <td class="actions-cell">${heeftUserCrudToken ? `<button onclick="startBewerken(${team.id})">Wijzig</button>` : ""}</td>
            </tr>`;
    }

    const renderTeams = () => {
        const tabelInhoud = document.getElementById("tabelInhoud");
        tabelInhoud.innerHTML = teams.map(maakTeamRij).join("");
    }

    const laadTeams = async () => {
        const tabelInhoud = document.getElementById("tabelInhoud");
        const foutmelding = document.getElementById("foutmelding");

        try {
            const authConfig = await getAuthHeaders();
            const response = await axios.get(apiTeams, authConfig);
            const json = response.data;

            teams = json;
            editTeamId = null;
            tabelInhoud.innerHTML = "";
            foutmelding.textContent = "";

            renderTeams();
        } catch (error) {
            console.error(error);
            foutmelding.textContent = "Kon teams niet laden. Controleer of de API draait op http://localhost:8000.";
        }
    }

    const startBewerken = (id) => {
        if (!heeftUserCrudToken) {
            document.getElementById("foutmelding").textContent = "Log eerst in met een user token met CRUD-rechten.";
            return;
        }

        editTeamId = id;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const annuleerBewerken = () => {
        editTeamId = null;
        document.getElementById("foutmelding").textContent = "";
        renderTeams();
    }

    const slaTeamOp = async (id) => {
        const foutmelding = document.getElementById("foutmelding");

        try {
            const payload = {
                name: document.getElementById(`edit-name-${id}`).value.trim(),
                base_country: document.getElementById(`edit-base-${id}`).value.trim() || null,
                team_principal: document.getElementById(`edit-principal-${id}`).value.trim() || null,
            };

            if (!payload.name) {
                throw new Error("Naam is verplicht.");
            }

            const crudConfig = await getCrudHeaders();
            const response = await axios.put(`${apiTeams}/${id}`, payload, crudConfig);
            const index = teams.findIndex(team => team.id === id);

            if (index >= 0) {
                teams[index] = response.data;
            }

            editTeamId = null;
            foutmelding.textContent = "";
            renderTeams();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 422) {
                foutmelding.textContent = "Validatie mislukt. Controleer de invoer.";
                return;
            }
            if (error.response?.status === 401) {
                crudToken = null;
                heeftUserCrudToken = false;
                editTeamId = null;
                renderTeams();
                updateLoginStatus("Sessie verlopen. Log opnieuw in.", "red");
                foutmelding.textContent = "Inloggen mislukt of verlopen. Vul opnieuw e-mail en wachtwoord in.";
                return;
            }
            foutmelding.textContent = error.message || "Team opslaan is mislukt.";
        }
    }

    const verwijderTeam = async (id) => {
        const foutmelding = document.getElementById("foutmelding");

        if (!confirm("Weet je zeker dat je dit team wilt verwijderen?")) {
            return;
        }

        try {
            const crudConfig = await getCrudHeaders();
            await axios.delete(`${apiTeams}/${id}`, crudConfig);

            teams = teams.filter(team => team.id !== id);
            editTeamId = null;
            foutmelding.textContent = "";
            renderTeams();
        } catch (error) {
            console.error(error);
            if (error.response?.status === 401) {
                crudToken = null;
                heeftUserCrudToken = false;
                editTeamId = null;
                renderTeams();
                updateLoginStatus("Sessie verlopen. Log opnieuw in.", "red");
                foutmelding.textContent = "Inloggen mislukt of verlopen. Vul opnieuw e-mail en wachtwoord in.";
                return;
            }
            foutmelding.textContent = "Team verwijderen is mislukt.";
        }
    }

    window.loginMetUserToken = loginMetUserToken;
    window.uitloggenUserToken = uitloggenUserToken;
    window.startBewerken = startBewerken;
    window.annuleerBewerken = annuleerBewerken;
    window.slaTeamOp = slaTeamOp;
    window.verwijderTeam = verwijderTeam;
</script>

</html>
